# Ruff configuration for TIGRESS.
target-version = "py38"
line-length = 100

[lint]
# Pyflakes (F) + a pragmatic pycodestyle subset (E) + import sorting (I) +
# docstring-presence rules for modules/classes/public methods/functions.
# Docstring coverage of the production code is enforced here (tests excluded
# below) rather than via CodeRabbit's pre-merge check, which cannot exclude
# test files and so produced a misleading metric.
select = ["E4", "E7", "E9", "F", "I", "D100", "D101", "D102", "D103", "D104"]

[lint.per-file-ignores]
# Tests are self-documenting by name; don't require docstrings there.
# They may also reach into private attributes to assert internal state.
"tests/*" = ["E402", "D"]
