app:
  name: "TIGRESS"
  log_level: INFO
  data_directory: "./data"

# Security posture: one knob that retunes the whole grid coherently.
# relaxed | normal | aggressive | paranoid  (env var TIGRESS_POSTURE wins)
# normal uses the values below exactly as written; other postures scale
# scan intervals, thresholds, alert floors, and correlation memory together.
# paranoid also boosts every detection's severity by +1.
posture: normal

server:
  host: "127.0.0.1"
  port: 8080
  api_token: ""   # if set (or via TIGRESS_API_TOKEN), data endpoints require Bearer auth

sensors:
  enabled:
    - wifi
    - phone
    - bluetooth
  wifi:
    scan_interval: 30
    alert_threshold: 3
    known_bssids_file: "data/known_bssids.txt"
  phone:
    sensor_type: accelerometer
    sample_rate: 1.0
    tamper_threshold: 2.0
    stability_samples: 10
  bluetooth:
    scan_interval: 30
    alert_threshold: 5
    known_devices_file: "data/known_bt_devices.txt"

detection:
  confidence_threshold: 0.6
  rules_file: config/rules.yaml
  enrichment_file: config/enrichment.yaml  # local OUI/tracker intel (offline)
  correlation:                # promote atomic indicators to TTP-level findings
    enabled: true
    window_seconds: 600       # how far back the engine remembers detections
    cooldown_seconds: 300     # min gap before the same finding re-fires
    allowlist:                # YOUR OWN gear — excluded from correlation so
                              # your watch/earbuds never look like a tracker.
                              # Curate by hand; do NOT point at known_* files
                              # (those record every device ever seen).
      entities: []            # inline MACs, optionally bt:/bssid:/ip: prefixed
      file: data/trusted_entities.txt   # one entry per line, '#' comments ok
    movement:                 # accelerometer context for persistence findings
      enabled: true
      delta_threshold: 1.5    # m/s² deviation from gravity that counts as motion
      escalate_severity: 1    # severity bump when entity recurs WHILE moving
      require_movement: false # true = persistence only fires if device moved
      retention_seconds: 1800 # motion history kept for correlation lookback
    rules:
      entity_persistence:     # same BSSID/MAC recurring => tracking suspect
        enabled: true
        min_hits: 3
        min_span_seconds: 60
        severity: 4
      cross_sensor:           # multiple sensor domains alerting together
        enabled: true
        min_sensor_types: 2
        severity: 4
      burst:                  # raw detection volume spike in the window
        enabled: true
        min_detections: 8
        severity: 4
  ml_models:
    wifi: "models/wifi_anomaly.pkl"
    phone: "models/phone_anomaly.pkl"
    bluetooth: "models/bluetooth_anomaly.pkl"
  training_samples: 300

alerting:
  notification: true
  log_file: data/alerts/tigress.log
  forensic_log: data/alerts/forensic.jsonl
  forensic_max_bytes: 0      # rotate the forensic log past this size (0 = never); writes a detached .sha256 sidecar
  forensic_retention_days: 0 # prune rotated forensic logs older than this (0 = keep forever)
  history_size: 500          # recent detections kept in memory for the API
  async_dispatch: true       # deliver alerts on background threads (never block detection)
  async_workers: 2           # number of background delivery threads
  queue_size: 256            # max queued alerts before new ones are dropped with a warning
  channels:                  # pluggable alert delivery; each fires at/above its min_severity
    termux:
      enabled: true
      min_severity: 1
    webhook:
      enabled: false
      url: ""
      min_severity: 3
      timeout: 5
      allowed_hosts: []      # egress allowlist; empty = unrestricted, else host must be listed
    email:
      enabled: false
      smtp_host: ""
      smtp_port: 587
      username: ""
      password: ""         # or leave blank and set the TIGRESS_SMTP_PASSWORD env var
      from: "tigress@localhost"
      to: []
      use_tls: true
      min_severity: 4

security:
  process_monitoring: false  # alarm on newly-appeared, non-whitelisted processes (--secure)
  process_whitelist: []      # extra process names to treat as expected
  monitor_interval: 30       # seconds between runtime integrity checks
